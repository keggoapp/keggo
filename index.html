<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <title>Keggo V2 — Design Explorations</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Stop iOS Safari from auto-linking dates/phone numbers and styling them blue.
       iOS colours detected links via -webkit-text-fill-color, which beats `color`,
       so both must be overridden. */
    a[x-apple-data-detectors],
    a[x-apple-data-detectors] *,
    a[href^="x-apple-data-detectors:"],
    a[href^="tel:"] {
      color: inherit !important;
      -webkit-text-fill-color: inherit !important;
      text-decoration: none !important;
      font: inherit !important;
      cursor: inherit !important;
      pointer-events: none !important;
    }
    :root {
      --cream: #F2E4C4; --cream-deep: #E7D6AC; --paper: #f7eed6;
      --ink: #1A1715; --ink-soft: #2a2724;
      --tomato: #D84A2A; --tomato-deep: #b73b1f;
      --honey: #F4B944;
      --grey-600: #605a51; --grey-400: #968e7f; --grey-200: #d9d0bb;
      --card: #FBF6E5;
      /* Tile background — warm sage-tinted off-white. Distinct from
         both pure white and the cream pills/chips, so cards feel like
         their own surface rather than blending into the page. */
      --tile: #E5DFC8;
      --radius: 16px; --radius-sm: 10px;
      --shadow-hard: 5px 5px 0 var(--ink);
      --shadow-tomato: 5px 5px 0 var(--tomato);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --border-w: 2.5px;
      --font-display: 'Fredoka', system-ui, sans-serif;
      --font-body: 'Nunito', system-ui, sans-serif;
      --font-hand: 'Caveat', cursive;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    /* Subtle warm paper grain — keeps cream from feeling like a flat fill */
    body {
      font-family: var(--font-body); background: var(--paper); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240' viewBox='0 0 240 240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      background-attachment: fixed;
      background-size: 240px 240px;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* Headlines — display lockup */
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .scale-in { animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    .spin { animation: spin 1s linear infinite; }

    .header { background: var(--cream); border-bottom: 2.5px solid var(--ink); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1440px; margin: 0 auto; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 10px; position: relative; }
    .logo-mark { font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: -0.03em; color: var(--ink); }
    .logo-mark .dot { color: var(--tomato); }
    .beta-tag { display: inline-block; background: transparent; color: var(--ink); font-family: var(--font-mono); font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.18em; margin-left: 8px; vertical-align: middle; border: 1.5px solid var(--ink); text-transform: uppercase; }
    .nav-pills { display: flex; gap: 6px; }
    .nav-pill { padding: 8px 18px; border-radius: 100px; border: var(--border-w) solid var(--ink); background: var(--cream); color: var(--ink); font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition); position: relative; }
    .nav-pill:hover { background: var(--card); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px, -1px); }
    .nav-pill.active { background: var(--ink); color: var(--cream); box-shadow: 3px 3px 0 var(--tomato); }
    .nav-pill .badge { position: absolute; top: -8px; right: -8px; background: var(--ink); color: var(--honey); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid var(--ink); font-family: 'Fredoka', sans-serif; }
    .user-menu { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--ink); color: var(--cream); display: flex; align-items: center; justify-content: center; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 700; border: 2px solid var(--ink); }
    .user-name { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; }
    .logout-btn { padding: 6px 14px; border: var(--border-w) solid var(--ink); background: var(--cream); border-radius: 100px; font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); transition: all var(--transition); }
    .logout-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 2px 2px 0 var(--ink); }

    .container { max-width: 1440px; margin: 0 auto; padding: 28px 32px; flex: 1; width: 100%; }

    /* ---- HERO — calm, editorial, restrained ---- */
    .hero {
      position: relative; padding: 64px 0 32px; margin-bottom: 16px;
      max-width: 760px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 12px;
      color: var(--ink); font-family: var(--font-mono); font-size: 13px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 18px;
      padding: 8px 16px 8px 14px; border: 2px solid var(--ink); border-radius: 100px;
      background: var(--card);
    }
    .hero-badge .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--tomato);
      box-shadow: 0 0 0 4px rgba(216,74,42,0.18), 0 0 14px 2px rgba(216,74,42,0.55);
      animation: pulse-orange 2.4s ease infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes pulse-orange {
      0%, 100% { box-shadow: 0 0 0 4px rgba(216,74,42,0.18), 0 0 14px 2px rgba(216,74,42,0.55); }
      50%      { box-shadow: 0 0 0 7px rgba(216,74,42,0.08), 0 0 22px 4px rgba(216,74,42,0.85); }
    }
    .hero h2 {
      font-family: var(--font-display); font-size: clamp(36px, 5.6vw, 64px);
      font-weight: 700; letter-spacing: -0.028em; line-height: 0.98;
      margin-bottom: 22px; color: var(--ink); max-width: 16ch;
    }
    .hero h2 em {
      font-family: var(--font-hand); color: var(--ink); font-style: normal;
      font-size: 1.05em; font-weight: 700; display: inline-block;
      transform: rotate(-2deg); margin: 0 0.04em; line-height: 1;
    }
    .hero h2 .dot { color: var(--tomato); }
    .hero p {
      color: var(--ink-soft); font-size: 17px; max-width: 52ch; margin: 0;
      line-height: 1.6; font-family: var(--font-body);
    }
    .hero p b { color: var(--ink); font-weight: 600; }

    @media (max-width: 700px) {
      .hero { padding: 36px 0 20px; }
      .hero h2 { font-size: clamp(34px, 9vw, 46px); margin-bottom: 16px; }
      .hero-badge { margin-bottom: 14px; font-size: 10px; }
      .hero p { font-size: 15px; }
    }

    /* ---- SEARCH SHELL — calm, restrained paper card ---- */
    .filter-shell {
      background: var(--cream); border: 2px solid var(--ink); border-radius: 18px;
      padding: 16px 18px 14px; margin-bottom: 22px; position: relative;
    }

    .search-bar { display: flex; gap: 10px; margin-bottom: 12px; }
    .search-input-wrap { flex: 1; position: relative; }
    .search-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink); opacity: 0.65; }
    .search-input-wrap input { width: 100%; padding: 12px 14px 12px 42px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 15px; font-family: var(--font-body); font-weight: 500; background: var(--card); color: var(--ink); transition: all var(--transition); outline: none; }
    .search-input-wrap input:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .search-input-wrap input::placeholder { color: var(--grey-400); font-weight: 400; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filter-select { padding: 10px 14px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: var(--font-display); font-size: 13px; font-weight: 500; background: var(--card); color: var(--ink); cursor: pointer; transition: all var(--transition); outline: none; min-width: 150px; }
    .filter-select:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .clear-btn { padding: 10px 16px; border: var(--border-w) solid var(--ink); background: var(--card); border-radius: 100px; font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink); transition: all var(--transition); }
    .clear-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px,-1px); }

    .location-input-wrap { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .location-input { flex: 1; padding: 11px 16px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 14px; font-family: var(--font-body); font-weight: 500; background: var(--card); color: var(--ink); outline: none; transition: all var(--transition); }
    .location-input:focus { box-shadow: 3px 3px 0 var(--ink); }
    .location-btn { padding: 10px 18px; border: var(--border-w) solid var(--ink); background: var(--ink); color: var(--cream); border-radius: 100px; font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); box-shadow: 3px 3px 0 var(--ink); }
    .location-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }

    .cat-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .cat-chip { padding: 8px 18px 8px 12px; border-radius: 100px; border: var(--border-w) solid var(--ink); background: var(--card); font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition); color: var(--ink); display: flex; align-items: center; gap: 9px; }
    .cat-chip:hover { background: var(--cream); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px, -1px); }
    .cat-chip.active { background: var(--ink); color: var(--cream); box-shadow: 3px 3px 0 var(--tomato); }

    .results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 14px; flex-wrap: wrap; }
    .results-bar .count { font-size: 14px; color: var(--ink-soft); font-weight: 500; font-family: var(--font-body); }
    .results-bar .count strong { color: var(--ink); font-weight: 700; }
    .view-btns { display: flex; gap: 2px; background: var(--cream); border-radius: 100px; padding: 3px; border: 2px solid var(--ink); }
    .view-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 50%; cursor: pointer; color: var(--grey-400); transition: all var(--transition); }
    .view-btn.active { background: var(--ink); color: var(--cream); }

    /* ---- EVENT CARDS — calm sticker, single shadow ---- */
    /* 3 across on desktop; the image carries a 4:3 ratio so tiles scale up
       proportionally as the container widens. */
    .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; padding-top: 4px; }
    .card { background: var(--tile); border-radius: 16px; border: 2px solid var(--ink); overflow: visible; transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; cursor: pointer; box-shadow: none; }
    .card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
    .card-image-wrap { position: relative; overflow: hidden; border-radius: 14px 14px 0 0; aspect-ratio: 4 / 3; }
    .card-image { width: 100%; height: 100%; object-fit: cover; background: var(--cream); display: block; border-bottom: 2px solid var(--ink); }
    .card-icon-badge { position: absolute; top: 12px; left: 12px; width: 56px; height: 56px; background: var(--honey); border: 2.5px solid var(--ink); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: none; transition: box-shadow var(--transition), transform var(--transition); }
    .card:hover .card-icon-badge { box-shadow: 3px 3px 0 var(--tomato); transform: translate(-1px,-1px); }
    .card-icon-badge svg, .card-icon-badge img { width: 36px; height: 36px; }
    /* "tonight!" sticker — only shown for events happening today, on
       the venue-side view. Mirrors .card-cat-tag exactly (same mono
       font, size, padding, border, letter-spacing) so the row reads
       as a uniform set of pills. Only the colour scheme differs to
       call it out. */
    .card-when-sticker {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
      text-transform: uppercase; letter-spacing: 0.14em;
      border: 1.5px solid var(--ink);
      background: var(--ink); color: var(--honey);
      pointer-events: none; white-space: nowrap;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .card:hover .card-when-sticker,
    .list-item:hover .card-when-sticker { box-shadow: 2px 2px 0 var(--tomato); transform: translate(-1px,-1px); }
    /* Row of chips at the top of the card-content — category pill,
       "tonight!" hype chip, optional sport sub-tag. Equal min-height
       on every child keeps the Caveat sticker visually centred against
       the mono cat-tag regardless of their internal text metrics. */
    .card-tag-row {
      display: flex; align-items: stretch; flex-wrap: wrap;
      gap: 6px; margin-bottom: 10px;
    }
    .card-tag-row > * {
      margin: 0;
      min-height: 22px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
    }
    .card-content { padding: 18px 20px 18px; position: relative; }
    /* Venue explore contexts never show the "tonight!" sticker — the tag
       is event-specific, not venue-specific. Suppress it anywhere a card
       sits inside a venue grid or venue profile. */
    .venue-grid .card-when-sticker,
    .venue-card .card-when-sticker,
    .profile-card .card-when-sticker,
    .venue-events-list .card-when-sticker { display: none !important; }
    .card-cat-tag { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.14em; border: 1.5px solid var(--ink); transition: box-shadow var(--transition), transform var(--transition); }
    .card:hover .card-cat-tag,
    .list-item:hover .card-cat-tag,
    .card-cat-tag:hover { box-shadow: 2px 2px 0 var(--tomato); transform: translate(-1px,-1px); }
    .card-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; margin-bottom: 4px; line-height: 1.18; color: var(--ink); letter-spacing: -0.018em; }
    .card-venue-link { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--ink-soft); cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; text-decoration-thickness: 1.5px; text-decoration-color: var(--ink); transition: color var(--transition), text-decoration-color var(--transition); }
    .card-venue-link:hover { color: var(--honey); text-decoration-color: var(--honey); }
    .card-venue-area { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; color: var(--ink-soft); margin-top: 2px; margin-bottom: 6px; letter-spacing: 0.14em; text-transform: uppercase; }
    .card-venue-services { display: flex; gap: 4px; flex-wrap: nowrap; overflow: hidden; margin: 10px 0 8px; width: 100%; align-items: center; }
    .card-venue-services .mini-tag { font-family: var(--font-display); font-size: 9.5px; font-weight: 500; padding: 2px 7px; border-radius: 100px; border: 1.5px solid var(--ink); background: var(--cream); color: var(--ink); opacity: 0.85; white-space: nowrap; flex-shrink: 0; }
    .card-venue-services .mini-tag.mini-tag-more { background: var(--ink); color: var(--cream); opacity: 1; cursor: default; }
    .card-meta { display: flex; gap: 14px; font-size: 13px; color: var(--ink-soft); margin-bottom: 14px; margin-top: 10px; font-family: var(--font-body); flex-wrap: wrap; align-items: center; }
    .card-meta span { display: flex; align-items: center; gap: 4px; }
    .card-meta .meta-mono { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); }
    /* Prominent meta row — date/time/price sits between the headline block
       and the venue service tags. Larger and inkier than the service tags
       below, but not louder than the title / venue name above. */
    .card-meta.card-meta-prominent { font-size: 14px; font-weight: 600; color: var(--ink); margin-top: 12px; margin-bottom: 4px; gap: 12px; }
    .card-meta.card-meta-prominent .meta-mono { font-size: 11.5px; font-weight: 700; color: var(--ink); }
    .card-badges { display: flex; gap: 6px; align-items: center; }
    .card-badge { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: transparent; color: var(--ink); border: 1.5px solid var(--ink); font-size: 12px; font-weight: 700; cursor: pointer; transition: all var(--transition); }
    .card-badge:hover { background: var(--ink); color: var(--cream); }
    .card-badge.is-saved { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    .events-list { display: flex; flex-direction: column; gap: 12px; }
    .list-item { background: var(--tile); border: 2px solid var(--ink); border-radius: 14px; padding: 16px; display: flex; gap: 16px; align-items: flex-start; cursor: pointer; transition: transform var(--transition), box-shadow var(--transition); box-shadow: none; position: relative; }
    .list-item:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
    .list-item-img { width: 100px; height: 88px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--cream); border: 2px solid var(--ink); }
    .list-item-body { flex: 1; min-width: 0; }
    .list-item-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.015em; }
    .list-item-meta { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 6px; font-family: var(--font-body); }
    .list-item-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; font-family: var(--font-body); }
    .list-item-venue { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--ink-soft); margin-bottom: 2px; transition: color var(--transition), text-decoration-color var(--transition); }
    .list-item-venue:hover { color: var(--honey); text-decoration-color: var(--honey) !important; }
    .list-item-area { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; letter-spacing: 0.14em; text-transform: uppercase; }
    .list-item-services { display: flex; gap: 4px; flex-wrap: wrap; margin: 10px 0 0; }
    .list-item-services .mini-tag { font-family: var(--font-display); font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; border: 1.5px solid var(--ink); background: var(--cream); color: var(--ink); opacity: 0.85; }

    .map-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 0; background: var(--card); border-radius: var(--radius); border: var(--border-w) solid var(--ink); overflow: hidden; height: 480px; box-shadow: 6px 6px 0 var(--ink); }
    .map-frame { width: 100%; height: 100%; border: none; z-index: 1; }
    .map-sidebar { max-height: 560px; overflow-y: auto; border-left: var(--border-w) solid var(--ink); padding: 8px; z-index: 10; background: var(--cream); }
    .map-event-chip { display: flex; gap: 10px; padding: 10px; background: var(--card); border: 2px solid var(--ink); border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-size: 12px; transition: all var(--transition); overflow: hidden; box-shadow: 3px 3px 0 var(--ink); }
    .map-event-chip:hover, .map-event-chip.active { background: var(--cream); box-shadow: 3px 3px 0 var(--tomato); border-color: var(--tomato); }
    .map-event-chip-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--cream); border: 2px solid var(--ink); }
    .map-event-chip-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .map-event-chip-title { font-family: 'Fredoka', sans-serif; font-weight: 700; margin-bottom: 3px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .map-event-chip-venue { font-family: 'Fredoka', sans-serif; font-size: 11px; color: var(--ink); font-weight: 600; margin-bottom: 3px; }

    .map-event-chip-price { font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 700; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,23,21,0.55); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; animation: fadeIn 0.2s ease; }
    .modal { background: var(--card); border-radius: 22px; padding: 30px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; border: 3px solid var(--ink); box-shadow: 8px 8px 0 var(--ink); }
    .detail-modal { background: var(--card); border-radius: 22px; padding: 30px; max-width: 540px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; border: 3px solid var(--ink); box-shadow: 8px 8px 0 var(--tomato); }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--cream); border: 2.5px solid var(--ink); border-radius: 50%; cursor: pointer; color: var(--ink); font-size: 18px; transition: all var(--transition); font-family: var(--font-mono); z-index: 1; box-shadow: 2px 2px 0 var(--ink); }
    .modal-close:hover { background: var(--tomato); color: var(--cream); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }

    .login-tabs { display: flex; gap: 0; margin-bottom: 24px; border: var(--border-w) solid var(--ink); border-radius: 100px; overflow: hidden; }
    .login-tab { flex: 1; padding: 12px; text-align: center; background: var(--cream); border: none; font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; transition: all var(--transition); }
    .login-tab.active { background: var(--ink); color: var(--cream); }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--ink); letter-spacing: 0.14em; text-transform: uppercase; }
    .form-field input { padding: 12px 18px; border: var(--border-w) solid var(--ink); border-radius: 100px; font-size: 14px; font-family: var(--font-body); font-weight: 500; background: var(--cream); color: var(--ink); outline: none; transition: all var(--transition); }
    .form-field input:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .form-error { color: var(--ink); font-family: var(--font-display); font-size: 12px; font-weight: 700; }
    .oauth-btns { display: flex; gap: 10px; }
    .oauth-btn { flex: 1; padding: 10px 12px; border: var(--border-w) solid var(--ink); background: var(--card); border-radius: 100px; font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink); transition: all var(--transition); }
    .oauth-btn:hover { background: var(--cream); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px,-1px); }
    .form-submit { padding: 13px 26px; background: var(--ink); color: var(--cream); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); margin-top: 8px; box-shadow: 4px 4px 0 var(--tomato); letter-spacing: -0.005em; }
    .form-submit:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--tomato); }

    .detail-poster { width: 100%; aspect-ratio: 4 / 3; height: auto; object-fit: cover; border-radius: 14px; margin-bottom: 20px; background: var(--cream); display: block; border: var(--border-w) solid var(--ink); }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .detail-title { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; flex: 1; color: var(--ink); line-height: 1.1; }
    .detail-actions { display: flex; gap: 8px; }
    .detail-action-btn { width: 40px; height: 40px; border-radius: 50%; border: var(--border-w) solid var(--ink); background: var(--cream); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); color: var(--ink); }
    .detail-action-btn:hover { background: var(--tomato); color: var(--cream); box-shadow: 2px 2px 0 var(--ink); }
    .detail-action-btn.saved { background: var(--ink); color: var(--cream); }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .detail-info-item { padding: 14px; background: var(--cream); border-radius: 12px; border: 2px solid var(--ink); }
    .detail-info-label { font-family: 'Fredoka', sans-serif; font-size: 11px; font-weight: 600; color: var(--grey-600); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .detail-info-value { font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); }
    .detail-description { font-size: 14px; line-height: 1.6; color: var(--ink); margin-bottom: 20px; padding: 14px; background: var(--cream); border-radius: 12px; border: 2px solid var(--ink); }
    .google-map-embed { width: 100%; height: 180px; border-radius: 12px; border: 2px solid var(--ink); }

    .form-panel { background: var(--card); border: var(--border-w) solid var(--ink); border-radius: 22px; padding: 36px; max-width: 640px; margin: 0 auto; box-shadow: 6px 6px 0 var(--ink); position: relative; }
    .form-panel h2 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    .form-panel .subtitle { color: var(--ink-soft); font-size: 14px; margin-bottom: 28px; font-family: var(--font-body); }
    .poster-upload { border: 3px dashed var(--ink); border-radius: 14px; padding: 26px; text-align: center; cursor: pointer; transition: all var(--transition); margin-bottom: 24px; background: var(--cream); }
    .poster-upload:hover { background: var(--card); box-shadow: 4px 4px 0 var(--tomato); transform: translate(-1px,-1px); }
    .poster-upload input[type="file"] { display: none; }
    .poster-upload-content { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .poster-upload-icon { font-size: 28px; color: var(--ink); opacity: 0.55; }
    .poster-upload-text { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink-soft); }
    .poster-preview { width: 100%; aspect-ratio: 4 / 3; height: auto; object-fit: cover; border-radius: 12px; margin-bottom: 16px; background: var(--cream); border: 2px solid var(--ink); display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 2px; }
    .field label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--ink); letter-spacing: 0.14em; text-transform: uppercase; }
    .field input, .field select, .field textarea { padding: 11px 16px; border: var(--border-w) solid var(--ink); border-radius: 12px; font-size: 14px; font-family: var(--font-body); font-weight: 500; background: var(--cream); color: var(--ink); outline: none; transition: all var(--transition); }
    .field input:focus, .field select:focus, .field textarea:focus { box-shadow: 3px 3px 0 var(--tomato); }
    .field textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 10px; margin-top: 26px; justify-content: flex-end; }
    .btn-primary { padding: 12px 26px; background: var(--ink); color: var(--cream); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; transition: all var(--transition); box-shadow: 4px 4px 0 var(--tomato); letter-spacing: -0.005em; display: inline-flex; align-items: center; }
    .btn-primary:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--tomato); }
    .btn-ghost { padding: 12px 26px; background: var(--cream); color: var(--ink); border: var(--border-w) solid var(--ink); border-radius: 100px; font-family: var(--font-display); font-size: 15px; font-weight: 600; cursor: pointer; transition: all var(--transition); }
    .btn-ghost:hover { background: var(--card); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px,-1px); }

    /* ---- ADD EVENT WIZARD ---- */
    .wizard-progress { display: flex; align-items: center; gap: 0; margin-bottom: 8px; }
    .wizard-step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--grey-300); background: var(--cream); display: flex; align-items: center; justify-content: center; font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 700; color: var(--grey-400); flex-shrink: 0; transition: all var(--transition); }
    .wizard-step-dot.active { border-color: var(--ink); background: var(--ink); color: var(--cream); }
    .wizard-step-dot.done { border-color: var(--ink); background: var(--ink); color: var(--cream); cursor: pointer; }
    .wizard-step-dot.done:hover { box-shadow: 2px 2px 0 var(--ink); transform: translate(-1px,-1px); }
    .wizard-connector { flex: 1; height: 2px; background: var(--grey-200); margin: 0 4px; transition: background 0.3s; }
    .wizard-connector.done { background: var(--ink); }
    .wizard-step-label { font-family: 'Fredoka', sans-serif; font-size: 11px; font-weight: 700; color: var(--grey-500); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 22px; }
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 8px 0 4px; }
    .cat-tile { border: 2px solid var(--grey-200); border-radius: 12px; padding: 10px 4px 8px; text-align: center; cursor: pointer; transition: all var(--transition); background: var(--card); display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .cat-tile:hover { border-color: var(--ink); transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--ink); }
    .cat-tile.selected { border-color: var(--ink); background: var(--ink); color: var(--cream); box-shadow: 3px 3px 0 var(--tomato); transform: translate(-1px,-1px); }
    .cat-tile-emoji { font-size: 22px; line-height: 1; }
    .cat-tile-label { font-family: 'Fredoka', sans-serif; font-size: 11px; font-weight: 700; line-height: 1.2; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 14px; }
    .quick-chip { padding: 5px 12px; border-radius: 100px; border: 1.5px solid var(--grey-200); font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--ink); transition: all var(--transition); white-space: nowrap; }
    .quick-chip:hover { border-color: var(--ink); background: var(--cream); }
    .quick-chip.selected { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .wizard-nav { display: flex; gap: 10px; margin-top: 24px; }
    .wizard-nav .btn-primary { flex: 1; }
    .wizard-nav .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: 4px 4px 0 var(--ink) !important; }
    .wizard-step-content { animation: stepFade 0.18s ease; }
    @keyframes stepFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .wizard-section-label { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }

    /* ---- VENUE PROFILE ---- */
    .profile-card { background: var(--card); border: var(--border-w) solid var(--ink); border-radius: 22px; max-width: 700px; margin: 0 auto; overflow: hidden; box-shadow: 6px 6px 0 var(--ink); }
    .profile-hero { width: 100%; aspect-ratio: 4 / 3; height: auto; object-fit: cover; border-bottom: var(--border-w) solid var(--ink); background: var(--cream); display: block; }
    .profile-body { padding: 30px; }
    .profile-name { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--ink); margin-bottom: 2px; letter-spacing: -0.022em; line-height: 1; }
    .profile-area { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink-soft); margin-bottom: 16px; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 6px; }
    .profile-bio { font-size: 15px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 22px; font-family: var(--font-body); }
    .profile-section-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
    .profile-section-title .scribble { font-family: var(--font-hand); color: var(--ink); font-size: 20px; transform: rotate(-3deg); display: inline-block; font-weight: 700; }
    .service-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .service-tag { font-family: 'Fredoka', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 100px; border: 2px solid var(--ink); background: var(--cream); color: var(--ink); display: flex; align-items: center; gap: 5px; }
    .service-tag.active { background: var(--ink); color: var(--cream); }
    .service-tag.toggle { cursor: pointer; transition: all var(--transition); }
    .service-tag.toggle:hover { box-shadow: 2px 2px 0 var(--ink); }
    .hours-grid { display: grid; grid-template-columns: 80px 1fr; gap: 6px 16px; margin-bottom: 20px; font-size: 13px; }
    .hours-day { font-family: 'Fredoka', sans-serif; font-weight: 600; color: var(--ink); }
    .hours-time { color: var(--ink-soft); }
    .profile-link { display: inline-flex; align-items: center; gap: 6px; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; color: var(--honey); text-decoration: none; padding: 8px 18px; border: 2px solid var(--ink); border-radius: 100px; background: var(--ink); transition: all var(--transition); }
    .profile-link:hover { background: var(--ink); color: var(--honey); box-shadow: 3px 3px 0 var(--tomato); transform: translate(-1px,-1px); }

    .explore-tabs { display: flex; gap: 0; margin-bottom: 22px; border: var(--border-w) solid var(--ink); border-radius: 100px; overflow: hidden; max-width: 280px; box-shadow: 4px 4px 0 var(--ink); }
    .explore-tab { flex: 1; padding: 11px 22px; text-align: center; background: var(--cream); border: none; font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; transition: all var(--transition); }
    .explore-tab.active { background: var(--ink); color: var(--cream); }
    .venue-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; padding-top: 4px; }
    .venue-card { background: var(--tile); border-radius: 16px; border: 2px solid var(--ink); overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; box-shadow: none; position: relative; }
    .venue-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
    .venue-card-img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: var(--cream); display: block; border-bottom: var(--border-w) solid var(--ink); }
    .venue-card-body { padding: 18px; }
    .venue-card-name { font-family: var(--font-hand); font-size: 30px; font-weight: 700; color: var(--ink); margin-bottom: 2px; letter-spacing: 0; line-height: 1.05; }
    .venue-card-area { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
    .venue-card-bio { font-size: 13.5px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-family: var(--font-body); }
    .venue-card-services { display: flex; gap: 5px; flex-wrap: wrap; }
    .venue-card-services .mini-tag { font-family: var(--font-display); font-size: 10.5px; font-weight: 500; padding: 3px 10px; border-radius: 100px; border: 1.5px solid var(--ink); background: var(--cream); color: var(--ink); }
    .sport-sub-tag { font-family: var(--font-display); font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px; border: 2px solid var(--ink); background: var(--cream); color: var(--ink); display: inline-flex; align-items: center; gap: 4px; margin-left: 4px; }

    .cat-chips-sport { background: var(--ink); padding: 10px 24px; border-radius: 0; border-top: var(--border-w) solid var(--ink); border-bottom: var(--border-w) solid var(--ink); margin-left: -24px; margin-right: -24px; }
    .cat-chips-sport .cat-chip { border-color: rgba(242,228,196,0.25); color: var(--cream); background: rgba(242,228,196,0.08); }
    .cat-chips-sport .cat-chip:hover { background: rgba(242,228,196,0.2); box-shadow: 2px 2px 0 rgba(242,228,196,0.3); transform: translate(-1px,-1px); }
    .cat-chips-sport .cat-chip.active { background: var(--cream); color: var(--ink); border-color: var(--cream); box-shadow: 2px 2px 0 rgba(0,0,0,0.25); }
    .cat-chips-more { padding: 10px 24px; background: var(--cream); border-top: var(--border-w) dashed var(--grey-400); border-bottom: var(--border-w) dashed var(--grey-400); margin-left: -24px; margin-right: -24px; }
    /* Icon is the load-bearing identifier on a chip — sit it in a small
       cream lozenge so it lifts off the chip ground and reads at glance. */
    .cat-chip img { width: 26px; height: 26px; pointer-events: none; background: var(--cream); border: 1.5px solid var(--ink); border-radius: 8px; padding: 2px; box-sizing: content-box; }
    .cat-chip.active img { background: var(--cream); border-color: var(--ink); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); padding: 12px 24px; border-radius: 100px; font-family: var(--font-display); font-size: 14px; font-weight: 600; border: 2.5px solid var(--ink); box-shadow: 4px 4px 0 var(--tomato); z-index: 10001; animation: fadeUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; }
    .empty { text-align: center; padding: 72px 24px 80px; color: var(--grey-400); position: relative; }
    .empty h3 { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.018em; }
    .empty p { font-family: var(--font-body); font-size: 14.5px; color: var(--grey-600); max-width: 38ch; margin: 0 auto; line-height: 1.55; }

    .footer { text-align: center; padding: 48px 24px 36px; border-top: 2.5px solid var(--ink); margin-top: 60px; background: var(--cream); position: relative; overflow: hidden; }
    .footer-wm { font-family: var(--font-display); font-weight: 700; font-size: 36px; letter-spacing: -0.025em; color: var(--ink); line-height: 1; }
    .footer-wm .dot { color: var(--tomato); }
    .footer-tagline { font-family: var(--font-body); font-size: 14.5px; color: var(--ink-soft); max-width: 42ch; margin: 10px auto 22px; line-height: 1.55; }
    .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .footer-links a { color: var(--ink); text-decoration: none; font-family: var(--font-display); font-weight: 500; font-size: 14px; transition: color var(--transition); border-bottom: 1.5px dotted transparent; padding-bottom: 1px; }
    .footer-links a:hover { color: var(--tomato); border-bottom-color: var(--tomato); }
    .footer-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--grey-600); letter-spacing: 0.16em; text-transform: uppercase; }
    .footer p { font-size: 12px; color: var(--grey-600); }

    /* ---- Category chips — single scrollable row ---- */
    .cat-chips {
      display: flex; gap: 8px; margin-bottom: 0;
      flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 6px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      margin-left: -24px; margin-right: -24px; padding-left: 24px; padding-right: 24px;
    }
    .cat-chips::-webkit-scrollbar { display: none; }
    .cat-chip { flex-shrink: 0; }
    .cat-chips-subrow {
      display: flex; gap: 8px; margin-top: 10px; margin-bottom: 10px;
      flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      margin-left: -24px; margin-right: -24px; padding-left: 24px; padding-right: 24px;
    }
    .cat-chips-subrow::-webkit-scrollbar { display: none; }
    .cat-chips-subrow .cat-chip { flex-shrink: 0; }

    /* Wizard variant — chips live inside a bordered form panel, so cancel
       the bleed-to-edge margins used in the explore filter. */
    .wizard-cat-chips { margin-left: 0; margin-right: 0; padding-left: 0; padding-right: 0; flex-wrap: wrap; overflow-x: visible; }
    .wizard-cat-chips.cat-chips-subrow { margin-top: 8px; margin-bottom: 6px; }

    /* ---- Venue Dashboard ----
       Black-and-yellow chrome. Default shadows are off; honey drops on hover
       to match the explore-page direction. Headline tile is grainy ink with
       honey numerals (the wordmark direction). */
    .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .dash-stat { background: var(--card); border: 2.5px solid var(--ink); border-radius: 14px; padding: 20px 18px; position: relative; box-shadow: none; transition: transform var(--transition), box-shadow var(--transition); }
    .dash-stat:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--tomato); }
    .dash-stat-num { font-family: var(--font-display); font-size: 40px; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 6px; letter-spacing: -0.025em; }
    .dash-stat-label { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; color: var(--grey-600); letter-spacing: 0.16em; text-transform: uppercase; }
    .dash-stat.accent { background: var(--ink); border-color: var(--ink); }
    .dash-stat.accent .dash-stat-num { color: var(--honey); }
    .dash-stat.accent .dash-stat-label { color: var(--cream); opacity: 0.8; }
