                              );
                            })}
                          </div>
                        </>
                      )}

                      {view === "list" && (
                        <>
                          <div className="events-list">
                            {filteredEvents.map(event => {
                              const catStyle = CAT_STYLES[event.category] || CAT_STYLES.other;
                              return (
                                <div key={event.id} className="list-item" onClick={() => { setSelectedEventList(filteredEvents); setSelectedEvent(event); }} style={{ borderLeftColor: catStyle.bg }}>
                                  <img src={getPosterImage(event, venueProfiles)} alt={event.title} className="list-item-img" />
                                  <div className="list-item-body">
                                    <div className="list-item-title">{event.title}</div>
                                    <div className="list-item-venue" onClick={e => { e.stopPropagation(); handleViewVenue(event.venue, event.area); }} style={{ cursor: "pointer", textDecoration: "underline dotted", textUnderlineOffset: "2px" }}>{event.venue}</div>
                                    {event.area && <div className="list-item-area">{event.area}</div>}
                                    <div className="list-item-meta">{formatDate(event.date).weekday} {formatDate(event.date).day} {formatDate(event.date).month} &middot; {event.time}{event.endTime ? ` – ${event.endTime}` : ""} &middot; <span style={{ color: "var(--ink)", fontWeight: "700" }}>{event.price}</span>{event.sportType && <span className="sport-sub-tag" style={{ marginLeft: "6px" }}>{SPORT_TYPES.find(s => s.id === event.sportType)?.label}</span>}</div>
                                    <div className="list-item-desc">{event.description.substring(0, 100)}...</div>
                                    {venueProfiles[event.venue]?.services?.length > 0 && (
                                      <div className="list-item-services">
                                        {venueProfiles[event.venue].services.map(s => <span key={s} className="mini-tag">{s}</span>)}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </>
                      )}

                      {view === "map" && <MapView events={filteredEvents} selectedEvent={selectedEvent} onSelectEvent={setSelectedEvent} userLocation={userLocation} venueProfiles={venueProfiles} />}

                      {filteredEvents.length === 0 && (
                        <div className="empty">
                          <h3>Nothing on nearby tonight.</h3>
                          <p>Try widening the area or clearing a filter — we'll nudge you next time something good lands.</p>
                        </div>
                      )}
                    </>
                  )}

                  {selectedEvent && <EventDetailModal event={selectedEvent} onClose={() => { setSelectedEvent(null); setSelectedEventList([]); }} onSave={handleSaveEvent} savedEvents={savedEvents} showToast={showToast} userLocation={userLocation} onViewVenue={handleViewVenue} venueProfiles={venueProfiles} user={user} onLoginRequired={() => { setSelectedEvent(null); setLoginType("user"); setShowLoginModal(true); }} eventList={selectedEventList} currentIdx={currentEventIdx} onNavigate={handleNavigateModal} />}
                </div>
              )}

              {currentNav === "dashboard" && user && user.type === "venue" && (
                <>
                  <VenueDashboard
                    user={user}
                    events={events}
                    profiles={venueProfiles}
                    onNewEvent={handleNavAdd}
                    onEditEvent={ev => { setEditingEvent(ev); setShowAddEvent(true); }}
                    onRepeatEvent={handleRepeatEvent}
                    onDeleteEvent={handleDeleteEvent}
                    onEditProfile={() => { setView("profile"); setShowAddEvent(false); }}
                    onPreviewProfile={() => handleViewVenue(user.name, user.area)}
                    onPreviewEvent={(ev, list) => { setSelectedEventList(list || [ev]); setSelectedEvent(ev); }}
                  />
                  {selectedEvent && <EventDetailModal event={selectedEvent} onClose={() => { setSelectedEvent(null); setSelectedEventList([]); }} onSave={handleSaveEvent} savedEvents={savedEvents} showToast={showToast} userLocation={userLocation} onViewVenue={handleViewVenue} venueProfiles={venueProfiles} user={user} onLoginRequired={() => { setSelectedEvent(null); setLoginType("user"); setShowLoginModal(true); }} eventList={selectedEventList} currentIdx={currentEventIdx} onNavigate={handleNavigateModal} />}
                </>
              )}

              {currentNav === "profile" && user && user.type === "venue" && (
                <div className="container">
                  <EditVenueProfile user={user} profiles={venueProfiles} onSave={handleSaveProfile} onCancel={() => setView("grid")} />
                </div>
              )}

              {currentNav === "saved" && (
                <div className="container">
                  <div style={{ marginBottom: "28px", paddingTop: "32px" }}>
                    <h2 style={{ fontFamily: "var(--font-display)", fontSize: "40px", fontWeight: "700", marginBottom: "10px", letterSpacing: "-0.025em", lineHeight: 1 }}>Saved<span style={{ color: "var(--tomato)" }}>.</span></h2>
                    <p style={{ color: "var(--ink-soft)", fontSize: "16px", maxWidth: "48ch", fontFamily: "var(--font-body)", lineHeight: 1.55 }}>Your shortlist of events. Tap one to open, or tap the bookmark to remove.</p>
                  </div>
                  {savedEvents.length === 0 ? (
                    <div className="empty"><SVGEmptySaveIcon /><h3>No saved events yet</h3><p>Tap the bookmark on any event you fancy — they'll wait for you here.</p></div>
                  ) : (
                    <div className="events-grid">
                      {savedEvents.map(event => {
                        const catStyle = CAT_STYLES[event.category] || CAT_STYLES.other;
                        const when = getEventWhenSticker(event.date);
                        return (
                          <div key={event.id} className="card" onClick={() => { setSelectedEventList(savedEvents); setSelectedEvent(event); }} style={{ cursor: "pointer" }}>
                            <div className="card-image-wrap">
                              <img src={getPosterImage(event, venueProfiles)} alt={event.title} className="card-image" />
                              <CardIconBadge category={event.category} />
                            </div>
                            <div className="card-content">
                              <div className="card-tag-row">
                                <span className="card-cat-tag" data-tone={catStyle.tone} style={{ background: catStyle.bg, color: catStyle.text }}>{CATEGORIES.find(c => c.id === event.category)?.label}</span>
                                {when && user && user.type === "venue" && <span className={`card-when-sticker ${when.tone}`}>{when.label}</span>}
                                {event.sportType && <span className="sport-sub-tag">{SPORT_TYPES.find(s => s.id === event.sportType)?.label}</span>}
                              </div>
                              <h3 className="card-title">{event.title}</h3>
                              <div className="card-meta"><span>{event.venue}</span><span className="meta-mono">{formatDate(event.date).weekday.toUpperCase()}</span><span>{event.time}</span><span style={{ color: "var(--ink)", fontWeight: "700" }}>{event.price}</span></div>
                              <div className="card-badges">
                                <div className="card-badge is-saved" onClick={e => { e.stopPropagation(); handleSaveEvent(event); }} title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {selectedEvent && <EventDetailModal event={selectedEvent} onClose={() => { setSelectedEvent(null); setSelectedEventList([]); }} onSave={handleSaveEvent} savedEvents={savedEvents} showToast={showToast} userLocation={userLocation} onViewVenue={handleViewVenue} venueProfiles={venueProfiles} user={user} onLoginRequired={() => { setSelectedEvent(null); setLoginType("user"); setShowLoginModal(true); }} eventList={selectedEventList} currentIdx={currentEventIdx} onNavigate={handleNavigateModal} />}
                </div>
              )}
            </>
          )}

          {viewingVenue && <VenueProfileModal venueName={viewingVenue.name} venueArea={viewingVenue.area} profiles={venueProfiles} events={events} onClose={() => setViewingVenue(null)} onSelectEvent={ev => { setViewingVenue(null); setSelectedEvent(ev); }} />}
          {showLoginModal && <LoginModal initialTab={loginType} onLogin={u => { setUser(u); setShowLoginModal(false); if (u.type === "venue") setView("dashboard"); }} onClose={() => setShowLoginModal(false)} onGetListed={() => { setShowLoginModal(false); setShowVenueGetListed(true); }} />}
          {showVenueGetListed && <VenueGetListedPage onClose={() => setShowVenueGetListed(false)} onOpenVenueLogin={() => { setShowVenueGetListed(false); setLoginType("venue"); setShowLoginModal(true); }} showToast={showToast} />}
          {toast && <div className="toast">{toast}</div>}

          {/* ---- Mobile bottom navigation ---- */}
          <nav className="mobile-bottom-nav">
            <button className={`mobile-nav-item ${currentNav === "explore" ? "active" : ""}`} onClick={() => { setView("grid"); setShowAddEvent(false); }}>
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Explore
            </button>
            {user && user.type === "venue" && (
              <button className={`mobile-nav-item ${currentNav === "dashboard" ? "active" : ""}`} onClick={() => { setView("dashboard"); setShowAddEvent(false); }}>
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
              </button>
            )}
            {user && user.type === "venue" && (
              <button className={`mobile-nav-item ${showAddEvent ? "active" : ""}`} onClick={handleNavAdd}>
                <div className="mobile-nav-add-wrap">
                  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                Add
              </button>
            )}
            {user && <button className={`mobile-nav-item ${currentNav === "saved" ? "active" : ""}`} onClick={() => { setView("saved"); setShowAddEvent(false); }}>
              <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
              {savedEvents.length > 0 && <span className="mobile-nav-badge">{savedEvents.length}</span>}
              Saved
            </button>}
            {user && user.type === "venue" && (
              <button className={`mobile-nav-item ${currentNav === "profile" ? "active" : ""}`} onClick={() => { setView("profile"); setShowAddEvent(false); }}>
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Profile
              </button>
            )}
            {!user && (
              <button className="mobile-nav-item" onClick={() => { setLoginType("user"); setShowLoginModal(true); }}>
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Sign In
              </button>
            )}
            {user && user.type !== "venue" && (
              <button className="mobile-nav-item" onClick={handleSignOut}>
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign out
              </button>
            )}
          </nav>

          <footer className="footer">
            <div className="footer-wm">Keggo<span className="dot">.</span></div>
            <p className="footer-tagline">Warm, grounded, unmistakably British. A pub noticeboard you can open on your phone.</p>
            <div className="footer-links"><a href="#">About</a><a href="#">For venues</a><a href="#">Privacy</a><a href="#">Contact</a></div>
            <div className="footer-meta">v0.1 DEMO · Direction: Chalk &amp; Sticker · &copy; 2026</div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
